```html
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

<style>

/* ===== FIX START ===== */

/* Prevent ANY horizontal overflow */
html, body {
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

/* Prevent elements from exceeding width */
*,
*::before,
*::after {
  box-sizing:border-box;
  max-width:100%;
}

/* Fix Safari/iPhone sideways bounce */
body {
  overscroll-behavior-x:none;
  touch-action:pan-y;
}

/* Fix containers that can overflow */
.wrap,
.hero-grid,
.gallery,
.location,
.grid-3,
.section {
  max-width:100%;
  overflow-x:hidden;
}

/* Fix image blocks */
.hero-media,
.product,
.gcard,
.tile,
.info-card,
.loc-card,
.footer-card {
  min-width:0;
}

/* Fix sticky button overflow */
.sticky-order{
  left:14px !important;
  right:14px !important;
  width:auto !important;
  transform:none !important;
}

/* FIX grid breaking on mobile */
@media (max-width:980px){

  .hero-grid,
  .gallery,
  .location,
  .grid-3{
    grid-template-columns:1fr !important;
  }

  .gallery .left{
    grid-template-columns:1fr !important;
  }

  .hero-media .stack{
    grid-template-columns:1fr !important;
    grid-template-rows:auto !important;
  }

  .tile.big,
  .gcard.big{
    grid-column:auto !important;
  }
}

/* ===== FIX END ===== */

</style>
